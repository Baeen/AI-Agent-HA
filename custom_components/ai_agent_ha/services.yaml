query:
  name: "Query AI Agent with Home Assistant context"
  description: "Run a custom AI prompt against your Home Assistant state dump."
  fields:
    prompt:
      description: "The question or instruction to send to AI model."
      example: "Turn on all the lights in the living room"
    debug:
      description: "Include a debug trace of the HA↔AI conversation (true/false)."
      example: true
      default: false
    provider:
      description: "The AI provider to use (openai, llama, gemini, openrouter, anthropic, alter, zai, local)"
      example: "openai"
      default: "openai"
      selector:
        select:
          options:
            - "openai"
            - "llama"
            - "gemini"
            - "openrouter"
            - "anthropic"
            - "alter"
            - "zai"
            - "local"

multimodal_query:
  name: "Query AI Agent with Images (Multimodal)"
  description: "Run a custom AI prompt with image attachments for multimodal AI models like GPT-4o, Gemini, etc."
  fields:
    prompt:
      description: "The question or instruction to send to AI model along with images."
      example: "What objects do you see in this image?"
    images:
      description: "Base64 encoded image data (array for multiple images)."
      example: "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJ..."
    mime_types:
      description: "MIME types of the images (if provided)."
      example: "image/jpeg"
    debug:
      description: "Include a debug trace of the HA↔AI conversation (true/false)."
      example: true
      default: false
    provider:
      description: "The AI provider to use (must support multimodal input like gpt-4o, gemini-2.5-flash)"
      example: "openai"
      default: "openai"
      selector:
        select:
          options:
            - "openai"
            - "gemini"
            - "anthropic"

create_dashboard:
  name: "Create Dashboard via AI Agent"
  description: "Create a new Home Assistant dashboard using AI assistance."
  fields:
    dashboard_config:
      description: "The dashboard configuration as a JSON object."
      example: '{"title": "My Dashboard", "url_path": "my-dashboard", "views": []}'
    provider:
      description: "The AI provider to use (openai, llama, gemini, openrouter, anthropic, alter, zai, local)"
      example: "openai"
      default: "openai"
      selector:
        select:
          options:
            - "openai"
            - "llama"
            - "gemini"
            - "openrouter"
            - "anthropic"
            - "alter"
            - "zai"
            - "local"

create_automation:
  name: "Create Automation via AI Agent"
  description: "Create a new Home Assistant automation using AI assistance."
  fields:
    automation:
      description: "The automation configuration as a JSON object."
      example: '{"alias": "Turn off lights at 9 PM", "trigger": [{"platform": "time", "at": "21:00:00"}], "action": [{"service": "light.turn_off", "target": {"entity_id": "light.living_room"}}]}'
    provider:
      description: "The AI provider to use (openai, llama, gemini, openrouter, anthropic, alter, zai, local)"
      example: "openai"
      default: "openai"
      selector:
        select:
          options:
            - "openai"
            - "llama"
            - "gemini"
            - "openrouter"
            - "anthropic"
            - "alter"
            - "zai"
            - "local"

update_dashboard:
  name: "Update Dashboard via AI Agent"
  description: "Update an existing Home Assistant dashboard using AI assistance."
  fields:
    dashboard_url:
      description: "The URL path of dashboard to update."
      example: "my-dashboard"
    dashboard_config:
      description: "The updated dashboard configuration as a JSON object."
      example: '{"title": "Updated Dashboard", "views": []}'
    provider:
      description: "The AI provider to use (openai, llama, gemini, openrouter, anthropic, alter, zai, local)"
      example: "openai"
      default: "openai"
      selector:
        select:
          options:
