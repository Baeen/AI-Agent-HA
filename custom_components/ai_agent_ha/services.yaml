            - "llama"
            - "gemini"
            - "openrouter"
            - "anthropic"
            - "alter"
            - "zai"
            - "local"

# Review YAML service
review_yaml:
  name: "Review YAML Configuration"
  description: "Review a YAML configuration for security, validity, and best practices."
  fields:
    yaml_content:
      description: "The YAML content to review."
      example: |
        alias: "Turn on lights at sunset"
        trigger:
          - platform: sun
            event: sunset
        action:
          - service: light.turn_on
            target:
              entity_id: light.living_room
    review_type:
      description: "Type of YAML being reviewed."
      example: "automation"
      default: "automation"
      selector:
        select:
          options:
            - "automation"
            - "dashboard"
            - "script"
            - "scene"
    provider:
      description: "The AI provider to use."
      example: "openai"
      default: "openai"
      selector:
        select:
          options:
            - "openai"
            - "llama"
            - "gemini"
            - "openrouter"
            - "anthropic"
            - "alter"
            - "zai"
            - "local"

# Analyze Logs service
analyze_logs:
  name: "Analyze Home Assistant Logs"
  description: "Analyze recent Home Assistant logs for errors, warnings, and patterns."
  fields:
    hours:
      description: "Number of hours of logs to analyze."
      example: 24
      default: 24
      selector:
        number:
          min: 1
          max: 720
          step: 1
    search_terms:
      description: "Comma-separated list of terms to search for (optional)."
      example: "timeout,error,connection"
    generate_ai_summary:
      description: "Whether to generate an AI summary of the analysis."
      example: true
      default: true
      selector:
        boolean:
    provider:
      description: "The AI provider to use."
      example: "openai"
      default: "openai"
      selector:
        select:
          options:
            - "openai"
            - "llama"
